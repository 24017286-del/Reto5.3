<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noticias</title>
<style>
    body{
        background-color: black;
        margin: 0;
    }

    header{
        background-color: yellowgreen;
        text-align: center;
        color: white;
        font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
        padding: 10px 0;
    }

    header h3{
        background-color: blueviolet;
        margin: 10px 20px 0;
        padding: 6px;
        border-radius: 4px;
    }

    button#refrescar{
        margin: 12px;
        padding: 8px 16px;
        font-size: 16px;
        cursor: pointer;
    }

    button#refrescar:disabled{
        opacity: 0.6;
        cursor: not-allowed;
    }

    #estado{
        color: aliceblue;
        background-color: blueviolet;
        text-align: center;
        font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
        padding: 8px;
        margin: 10px 20px;
        border-radius: 4px;
        display: none;
    }

    #estado.visible{
        display: block;
    }

    main{
        padding: 0 20px 20px;
    }

    .noticia{
        background-color: brown;
        text-align: center;
        color: white;
        font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
        margin-bottom: 16px;
        padding: 10px;
        border-radius: 6px;
    }

    .noticia img{
        max-width: 100%;
        max-height: 400px;
    }

    .noticia p{
        font-size: large;
    }

    .noticia a{
        color: aliceblue;
    }
</style>
</head>
<body>

    <header>
        <h1>Noticias</h1>
        <h3>Ahora se mostrarán las noticias</h3>
        <button id="refrescar">Refrescar</button>
    </header>

    <main>
        <div id="estado" role="status"></div>
        <section id="noticias" aria-live="polite"></section>
    </main>

    <script src="Reto5.js"></script>
</body>
</html>
